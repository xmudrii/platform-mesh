version: "3"

# Shared developer tooling for the monorepo.
#
# These go-installable tools are installed ONCE into the repository-root bin/
# and shared by every component, instead of each component maintaining its own
# copy. The bin path is resolved from the git top level, so the tools land in
# the same place no matter which directory a task is invoked from.
#
# Included by the root Taskfile as the `tools:` namespace. Components reference
# the binaries from the root bin (see each component's ROOT_BIN var) and depend
# on these tasks via the root's per-component targets.
#
# kcp is shared here too: the operators' envtest suites resolve the kcp binary
# via the TEST_KCP_ASSETS env var (which overrides each suite's per-config
# BinaryAssetsDirectory), so the component test-e2e targets point that at the
# root bin and depend on `tools:kcp`.

vars:
  TOPLEVEL:
    sh: echo "$(git rev-parse --show-toplevel)"
  BIN: '{{.TOPLEVEL}}/bin'
  HACK: '{{.TOPLEVEL}}/hack'
  CONTROLLER_TOOLS_VERSION: v0.21.0
  ENVTEST_K8S_VERSION: "1.36.0"
  ENVTEST_VERSION: release-0.24
  GOLANGCI_LINT_VERSION: 2.12.2
  GO_TEST_COVERAGE_VERSION: v2.18.8
  MOCKERY_VERSION: v3.7.0
  OAPI_VERSION: v2.7.1
  KCP_APIGEN_VERSION: v0.32.3

  # kcp release used by the operators' envtest suites (see component test-e2e).
  KCP_VERSION: 0.32.3

env:
  UGET_DIRECTORY: '{{.BIN}}'
  UGET_CHECKSUMS: '{{.HACK}}/tools.checksums'
  UGET_VERSIONED_BINARIES: 'true'

tasks:
  # `task tools` installs everything; `task tools:all` is an explicit alias.
  default:
    desc: Install all shared tools into the root bin.
    deps: [controller-gen, golangci-lint, mockery, apigen]
  all:
    desc: Install all shared tools into the root bin.
    deps: [controller-gen, golangci-lint, mockery, apigen]

  controller-gen:
    desc: Install controller-gen into the root bin.
    cmds:
      - GOBIN={{.BIN}} GOWORK=off go install sigs.k8s.io/controller-tools/cmd/controller-gen@{{.CONTROLLER_TOOLS_VERSION}}
    status:
      - test -s {{.BIN}}/controller-gen
      - '{{.BIN}}/controller-gen --version | grep -qw {{.CONTROLLER_TOOLS_VERSION}}'
  golangci-lint:
    silent: true
    desc: Install golangci-lint into the root bin.
    cmds:
      - "{{.HACK}}/uget.sh https://github.com/golangci/golangci-lint/releases/download/v{VERSION}/golangci-lint-{VERSION}-{GOOS}-{GOARCH}.tar.gz golangci-lint {{.GOLANGCI_LINT_VERSION}}"
  lint:
    desc: Lint all Go code in the repository using golangci-lint.
    internal: true
    vars:
      GOLANGCI_LINT:
        # this ensures (installs/updates) golangci-lint and outputs the absolute path to the binary
        sh: 'UGET_DIRECTORY={{.BIN}} UGET_CHECKSUMS={{.HACK}}/tools.checksums UGET_PRINT_PATH=absolute task tools:golangci-lint'
    cmds:
      # lint once with the repository-wide settings
      - '{{.GOLANGCI_LINT}} run --config {{.TOPLEVEL}}/.golangci.yaml --timeout 15m ./...'
      # and then again with per-component settings, if there are any
      - if: test -s .golangci.yaml
        cmd: '{{.GOLANGCI_LINT}} run --timeout 15m ./...'
  mockery:
    desc: Install mockery into the root bin.
    cmds:
      - GOBIN={{.BIN}} GOWORK=off go install github.com/vektra/mockery/v3@{{.MOCKERY_VERSION}}
      - rm -f {{.BIN}}/.mockery.*.stamp
      - touch {{.BIN}}/.mockery.{{.MOCKERY_VERSION}}.stamp
    status:
      - test -s {{.BIN}}/mockery
      - test -f {{.BIN}}/.mockery.{{.MOCKERY_VERSION}}.stamp
  apigen:
    desc: Install kcp apigen into the root bin.
    cmds:
      - GOBIN={{.BIN}} GOWORK=off go install github.com/kcp-dev/sdk/cmd/apigen@{{.KCP_APIGEN_VERSION}}
      - rm -f {{.BIN}}/.apigen.*.stamp
      - touch {{.BIN}}/.apigen.{{.KCP_APIGEN_VERSION}}.stamp
    status:
      - test -s {{.BIN}}/apigen
      - test -f {{.BIN}}/.apigen.{{.KCP_APIGEN_VERSION}}.stamp
  kcp:
    silent: true
    desc: Install kcp into the root bin (shared by the operators' envtest suites).
    cmds:
      - UGET_VERSIONED_BINARIES=false {{.HACK}}/uget.sh https://github.com/kcp-dev/kcp/releases/download/v{VERSION}/kcp_{VERSION}_{GOOS}_{GOARCH}.tar.gz kcp {{.KCP_VERSION}}
  envtest:
    internal: true
    status:
      - test -s {{.BIN}}/setup-envtest
      - test -f {{.BIN}}/.setup-envtest.{{.ENVTEST_VERSION}}.stamp
    cmds:
      - GOBIN={{.BIN}} GOWORK=off go install sigs.k8s.io/controller-runtime/tools/setup-envtest@{{.ENVTEST_VERSION}}
      - rm -f {{.BIN}}/.setup-envtest.*.stamp
      - touch {{.BIN}}/.setup-envtest.{{.ENVTEST_VERSION}}.stamp
  go-test-coverage:
    internal: true
    status:
      - test -s {{.BIN}}/go-test-coverage
      - test -f {{.BIN}}/.go-test-coverage.{{.GO_TEST_COVERAGE_VERSION}}.stamp
    cmds:
      - GOBIN={{.BIN}} GOWORK=off go install github.com/vladopajic/go-test-coverage/v2@{{.GO_TEST_COVERAGE_VERSION}}
      - rm -f {{.BIN}}/.go-test-coverage.*.stamp
      - touch {{.BIN}}/.go-test-coverage.{{.GO_TEST_COVERAGE_VERSION}}.stamp
  docker-compose:
    internal: true
    status:
      - test -s {{.BIN}}/docker-compose
    cmds:
      - GOBIN={{.BIN}} GOWORK=off go install github.com/docker/compose/v2/cmd@latest && mv {{.BIN}}/cmd {{.BIN}}/docker-compose
  oapi-codegen:
    internal: true
    status:
      - test -s {{.BIN}}/oapi-codegen
      - test -f {{.BIN}}/.oapi-codegen.{{.OAPI_VERSION}}.stamp
    cmds:
      - GOBIN={{.BIN}} GOWORK=off go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@{{.OAPI_VERSION}}
      - rm -f {{.BIN}}/.oapi-codegen.*.stamp
      - touch {{.BIN}}/.oapi-codegen.{{.OAPI_VERSION}}.stamp

  generate-crds:
    internal: true
    deps: [controller-gen]
    vars:
      # CRDs are usually generated based off the global apis module
      BASEDIR: '{{ .BASEDIR | default (print .TOPLEVEL "/apis") }}'
    cmds:
      - '{{.BIN}}/controller-gen crd:headerFile={{.HACK}}/boilerplate/boilerplate.yaml.txt paths={{.BASEDIR}}{{.PATH}} output:crd:artifacts:config={{.OUTPUT}}'

  generate-rbac:
    internal: true
    deps: [controller-gen]
    vars:
      ROLE: '{{ .ROLE | default "manager-role" }}'
    cmds:
      - '{{.BIN}}/controller-gen rbac:roleName={{.ROLE}},headerFile={{.HACK}}/boilerplate/boilerplate.yaml.txt paths={{.PATHS}} output:rbac:artifacts:config={{.OUTPUT}}'

  generate-deepcopy:
    internal: true
    deps: [controller-gen]
    vars:
      # deepcopy funcs are usually generated based off the global apis module
      BASEDIR: '{{ .BASEDIR | default (print .TOPLEVEL "/apis") }}'
    cmds:
      - "{{.BIN}}/controller-gen object:headerFile={{.HACK}}/boilerplate/boilerplate.go.txt paths={{.BASEDIR}}{{.PATH}}"

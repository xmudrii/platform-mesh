version: '3'

includes:
  # Shared go-installable tooling (controller-gen, golangci-lint, mockery,
  # apigen), installed once into the root bin/ and reused by every component.
  tools:
    taskfile: ../tools/Taskfile.yaml
    dir: .

tasks:
  ## Development
  mockery:
    deps: [tools:mockery]
    cmds:
      - "{{.BIN}}/mockery"
  generate:
    desc: Run code generation (mocks).
    cmds:
      - task: mockery
  fmt:
    cmds:
      - go fmt ./...
  lint:
    cmds:
      - task: fmt
      - task: tools:lint
  build:
    cmds:
      - go build ./...
  fuzz:
    desc: "Run fuzz tests with a configurable duration (default 30s per target)"
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - go test ./jwt/ -run=^$ -fuzz=FuzzNew -fuzztime={{.FUZZTIME}} -count=1
      - go test ./jwt/ -run=^$ -fuzz=FuzzGetURIValue -fuzztime={{.FUZZTIME}} -count=1
  test:
    deps:
      - task: mockery
    cmds:
      - go clean -testcache
      - go test ./...
  cover:
    desc: Run tests with coverage
    deps:
      - task: mockery
    cmds:
      - go clean -testcache
      - go test -coverprofile=cover.out -covermode=atomic -coverpkg=./... ./...
  test-coverage:
    desc: Run tests with coverage and check thresholds
    deps:
      - task: cover
    cmds:
      - go install github.com/vladopajic/go-test-coverage/v2@{{.GO_TEST_COVERAGE_VERSION}}
      - go-test-coverage --profile cover.out --config ./.testcoverage.yml

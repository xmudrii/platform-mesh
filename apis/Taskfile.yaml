version: "3"

# Standard component Taskfile for the shared apis module.
# Exposes the repo-standard targets: lint, test, test-e2e, generate, build.
#
# Shared tools (controller-gen, golangci-lint) come from the repository-root
# bin/ — installed by the root `tools:` tasks, referenced here via ROOT_BIN.

includes:
  # Shared go-installable tooling (controller-gen, golangci-lint, mockery,
  # apigen), installed once into the root bin/ and reused by every component.
  tools:
    taskfile: ../tools/Taskfile.yaml
    dir: .

tasks:
  build:
    desc: Build the apis module.
    cmds:
      - go build ./...
  fmt:
    cmds:
      - go fmt ./...
  lint:
    desc: Lint the apis module.
    cmds:
      - task: fmt
      - task: tools:lint
  generate:
    desc: Regenerate deepcopy code for the apis types.
    cmds:
      - task: tools:generate-deepcopy
        vars:
          PATH: /...
  test:
    desc: Run apis unit tests.
    cmds:
      - go test -count=1 ./...
  test-e2e:
    desc: No e2e tests for the apis module.
    cmds:
      - 'echo "apis: no e2e tests"'
  fuzz:
    desc: "Run fuzz tests with a configurable duration (default 30s per target)"
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - go test ./terminal/ -run=^$ -fuzz=FuzzTerminalRoundTrip -fuzztime={{.FUZZTIME}} -count=1
      - go test ./marketplace/ -run=^$ -fuzz=FuzzMarketplaceEntryRoundTrip -fuzztime={{.FUZZTIME}} -count=1

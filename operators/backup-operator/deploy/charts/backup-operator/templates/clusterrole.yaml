apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backup-operator-manager-role
rules:
  - apiGroups:
      - backup.platform-mesh.io
    resources:
      - platformbackups
      - platformrestores
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - backup.platform-mesh.io
    resources:
      - platformbackups/status
      - platformrestores/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - backup.platform-mesh.io
    resources:
      - platformbackups/finalizers
      - platformrestores/finalizers
    verbs:
      - update

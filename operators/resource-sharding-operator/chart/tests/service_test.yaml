suite: service
templates:
  - service.yaml
chart:
  version: 0.1.0
  appVersion: v0.1.0
release:
  name: rso
tests:
  - it: renders webhook service with default values (webhook enabled)
    asserts:
      - matchSnapshot: {}

  - it: renders nothing when webhook is disabled
    set:
      webhook.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders with custom webhook service name
    set:
      webhook.enabled: true
      webhook.serviceName: my-custom-webhook
    asserts:
      - matchSnapshot: {}

  - it: service name defaults to fullname-webhook
    asserts:
      - equal:
          path: metadata.name
          value: rso-resource-sharding-operator-webhook

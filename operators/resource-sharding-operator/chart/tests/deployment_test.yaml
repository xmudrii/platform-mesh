suite: deployment
templates:
  - deployment.yaml
chart:
  version: 0.1.0
  appVersion: v0.1.0
release:
  name: rso
tests:
  - it: renders with default values
    asserts:
      - matchSnapshot: {}

  - it: renders without webhook port when webhook is disabled
    set:
      webhook.enabled: false
    asserts:
      - matchSnapshot: {}

  - it: renders with custom webhook service name in env var
    set:
      webhook.enabled: true
      webhook.serviceName: my-custom-webhook
    asserts:
      - matchSnapshot: {}

  - it: renders with leader election disabled
    set:
      leaderElection.enabled: false
    asserts:
      - matchSnapshot: {}

  - it: renders with custom image tag
    set:
      image.tag: v0.99.0
    asserts:
      - matchSnapshot: {}

  - it: renders with pod annotations and labels
    set:
      podAnnotations:
        prometheus.io/scrape: "true"
      podLabels:
        team: platform
    asserts:
      - matchSnapshot: {}

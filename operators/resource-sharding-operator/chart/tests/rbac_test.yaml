suite: rbac
templates:
  - rbac.yaml
chart:
  version: 0.1.0
  appVersion: v0.1.0
release:
  name: rso
tests:
  - it: renders all RBAC resources with default values
    asserts:
      - matchSnapshot: {}

  - it: renders nothing when rbac.create is false
    set:
      rbac.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders with custom service account name
    set:
      serviceAccount.name: my-sa
    asserts:
      - matchSnapshot: {}

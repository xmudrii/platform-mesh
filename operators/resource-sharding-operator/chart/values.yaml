image:
  repository: ghcr.io/platform-mesh/resource-sharding-operator
  # -- Overrides the image tag (default: .Chart.AppVersion)
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

serviceAccount:
  # -- Create a service account
  create: true
  # -- Service account name (generated if not set)
  name: ""
  annotations: {}

rbac:
  # -- Create ClusterRole and ClusterRoleBinding
  create: true

leaderElection:
  # -- Enable leader election
  enabled: true

kcp:
  # -- KCP APIExportEndpointSliceName
  apiExportEndpointSliceName: "sharding.platform-mesh.io"

metrics:
  # -- Metrics bind address
  bindAddress: ":8080"
  # -- Enable secure serving for metrics
  secure: true

health:
  # -- Health probe bind address
  bindAddress: ":8081"

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

# -- Additional pod annotations
podAnnotations: {}

# -- Additional pod labels
podLabels: {}

securityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

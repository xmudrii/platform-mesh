apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourceshardings.sharding.platform-mesh.io
  labels:
    {{- include "resource-sharding-operator.labels" . | nindent 4 }}
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
spec:
  group: sharding.platform-mesh.io
  names:
    kind: ResourceSharding
    listKind: ResourceShardingList
    plural: resourceshardings
    singular: resourcesharding
  scope: Cluster
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.target.resource
          name: Target
          type: string
        - jsonPath: .status.totalShards
          name: Shards
          type: integer
        - jsonPath: .status.conditions[?(@.type=="Ready")].status
          name: Ready
          type: string
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: ResourceSharding defines the sharding configuration for a target resource type.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                rebalance:
                  properties:
                    interval:
                      default: 5m
                      type: string
                    minMovesPerCycle:
                      default: 10
                      minimum: 1
                      type: integer
                    movesPerCycle:
                      default: 10
                      maximum: 100
                      minimum: 1
                      type: integer
                    rateLimit:
                      default: 10
                      minimum: 1
                      type: integer
                    threshold:
                      default: 20
                      maximum: 100
                      minimum: 1
                      type: integer
                  type: object
                shardLabelKey:
                  default: sharding.platform-mesh.io/shard
                  type: string
                shards:
                  items:
                    properties:
                      name:
                        minLength: 1
                        type: string
                    required:
                      - name
                    type: object
                  minItems: 1
                  type: array
                target:
                  properties:
                    group:
                      type: string
                    resource:
                      type: string
                    version:
                      type: string
                  required:
                    - group
                    - version
                    - resource
                  type: object
                webhook:
                  properties:
                    enabled:
                      type: boolean
                  type: object
              required:
                - target
                - shards
              type: object
            status:
              properties:
                conditions:
                  items:
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                distribution:
                  items:
                    properties:
                      count:
                        type: integer
                      shard:
                        type: string
                    type: object
                  type: array
                lastRebalanceTime:
                  format: date-time
                  type: string
                observedGeneration:
                  format: int64
                  type: integer
                totalShards:
                  type: integer
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}

{{- if .Values.webhook.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "resource-sharding-operator.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "resource-sharding-operator.labels" . | nindent 4 }}
spec:
  ports:
    - name: webhook
      port: 443
      targetPort: 9443
      protocol: TCP
  selector:
    {{- include "resource-sharding-operator.selectorLabels" . | nindent 4 }}
{{- end }}

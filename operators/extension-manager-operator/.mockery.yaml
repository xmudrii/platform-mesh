all: false
force-file-write: true
formatter: goimports
log-level: info
recursive: false
require-template-schema-exists: true
template: testify
packages:
  go.platform-mesh.io/extension-manager-operator/pkg/validation:
    config:
      dir: pkg/validation/mocks
      pkgname: mocks
    interfaces:
      ExtensionConfiguration:
        config:
          structname: ExtensionConfiguration
          filename: mock_ExtensionConfiguration.go
  net/http:
    config:
      dir: pkg/validation/mocks
      pkgname: mocks
    interfaces:
      ResponseWriter:
        config:
          structname: ResponseWriter
          filename: mock_ResponseWriter.go
  sigs.k8s.io/controller-runtime/pkg/client:
    config:
      dir: pkg/subroutines/mocks
      pkgname: mocks
    interfaces:
      Client:
        config:
          structname: Client
          filename: mock_Client.go

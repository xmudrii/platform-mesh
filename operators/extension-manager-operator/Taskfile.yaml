version: '3'

includes:
  # Shared go-installable tooling (controller-gen, golangci-lint, mockery,
  # apigen), installed once into the root bin/ and reused by every component.
  tools:
    taskfile: ../../tools/Taskfile.yaml
    dir: .

dotenv: ['.taskenv', '.secret/.env', '{{.HOME}}/.env' ]

vars:
  CRD_DIRECTORY: config/crd/bases
  SEDCMD:
    sh: |
      if sed --version >/dev/null 2>&1; then
        echo "sed -i"
      else
        echo "sed -i ''"
      fi

tasks:
  default:
    silent: true
    cmds:
      - task --list-all

  ## Development
  mockery:
    deps: [tools:mockery]
    cmds:
      - "{{.BIN}}/mockery"
  manifests:
    cmds:
      - task: tools:generate-crds
        vars:
          PATH: /ui/...
          OUTPUT: '{{.CRD_DIRECTORY}}'
  generate:
    deps: [tools:apigen]
    cmds:
      - task: manifests
      - task: tools:generate-deepcopy
        vars:
          PATH: /ui/...
      - task: schemagen
      - "{{.BIN}}/apigen --input-dir {{.CRD_DIRECTORY}} --output-dir ./config/resources"
      - "{{.BIN}}/apigen --input-dir {{.CRD_DIRECTORY}} --output-dir ./test/setup"
      - task: copynamespacedcrd
  build:
    cmds:
      - go build ./...
  docker-build:
    cmds:
      - docker build .
  docker:kind:
    desc: "Build container image, load it into kind cluster, and restart deployments"
    vars:
      DEPLOYMENT_NAMESPACE: '{{.DEPLOYMENT_NAMESPACE | default "platform-mesh-system"}}'
      CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
      KIND_CLUSTER: '{{.KIND_CLUSTER | default "platform-mesh"}}'
    cmds:
      - task: docker:kind:load
        vars:
          DEPLOYMENT_NAMESPACE: '{{.DEPLOYMENT_NAMESPACE}}'
          CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME}}'
          KIND_CLUSTER: '{{.KIND_CLUSTER}}'
      - task: docker:kind:restart
        vars:
          DEPLOYMENT_NAMESPACE: '{{.DEPLOYMENT_NAMESPACE}}'
  docker:kind:load:
    desc: "Build container image with current tag from kind cluster and load it into kind"
    vars:
      CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
      KIND_CLUSTER: '{{.KIND_CLUSTER | default "platform-mesh"}}'
      DEPLOYMENT_NAMESPACE: '{{.DEPLOYMENT_NAMESPACE | default "platform-mesh-system"}}'
      IMAGE_TAG:
        sh: kubectl get deployment extension-manager-operator-operator -n {{.DEPLOYMENT_NAMESPACE}} -o jsonpath='{.spec.template.spec.containers[0].image}' | cut -d':' -f2
      IMAGE_NAME: ghcr.io/platform-mesh/extension-manager-operator:{{.IMAGE_TAG}}
    cmds:
      - |
        if [ -z "{{.IMAGE_TAG}}" ]; then
          echo "Error: Could not determine IMAGE_TAG from deployment extension-manager-operator-operator in namespace {{.DEPLOYMENT_NAMESPACE}}"
          exit 1
        fi
      - echo "Building image with tag {{.IMAGE_TAG}} using {{.CONTAINER_RUNTIME}}"
      - "{{.CONTAINER_RUNTIME}} build -t {{.IMAGE_NAME}} ."
      - |
        if [ "{{.CONTAINER_RUNTIME}}" = "podman" ]; then
          {{.CONTAINER_RUNTIME}} save {{.IMAGE_NAME}} -o /tmp/kind-image.tar
          kind load image-archive /tmp/kind-image.tar --name {{.KIND_CLUSTER}}
          rm -f /tmp/kind-image.tar
        else
          kind load docker-image {{.IMAGE_NAME}} --name {{.KIND_CLUSTER}}
        fi
      - echo "Image loaded into kind cluster {{.KIND_CLUSTER}}"
  docker:kind:restart:
    desc: "Restart extension-manager-operator deployments to pick up new image"
    vars:
      DEPLOYMENT_NAMESPACE: '{{.DEPLOYMENT_NAMESPACE | default "platform-mesh-system"}}'
    cmds:
      - kubectl rollout restart deployment/extension-manager-operator-operator -n {{.DEPLOYMENT_NAMESPACE}}
      - kubectl rollout restart deployment/extension-manager-operator-server -n {{.DEPLOYMENT_NAMESPACE}}
      - echo "All deployments restarted"

  ## Testing
  fmt:
    cmds:
      - go fmt ./...
  lint:
    cmds:
      - task: fmt
      - task: tools:lint
  test:
    deps: [tools:kcp]
    cmds:
      - go test ./...
  test-e2e:
    deps: [tools:kcp, tools:envtest]
    env:
      TEST_KCP_ASSETS: '{{.BIN}}'
    cmds:
      - |
        set -ex
        export KUBEBUILDER_ASSETS=$({{.BIN}}/setup-envtest use {{.ENVTEST_K8S_VERSION}} --bin-dir {{.BIN}} -p path)
        go test -tags integration ./... {{.ADDITIONAL_COMMAND_ARGS}}
  cover:
    deps: [tools:go-test-coverage]
    cmds:
      - task: test
        vars:
          ADDITIONAL_COMMAND_ARGS: -v -coverprofile=./cover.out -covermode=atomic -coverpkg=./...
      - "{{.BIN}}/go-test-coverage --threshold-file 80 --threshold-package 80 --threshold-total 95 --profile cover.out --config ./.testcoverage.yml"
  cover-e2e:
    deps: [tools:go-test-coverage]
    cmds:
      - task: test-e2e
        vars:
          ADDITIONAL_COMMAND_ARGS: -v -coverprofile=./cover.out -covermode=atomic -coverpkg=./...
      - "{{.BIN}}/go-test-coverage --threshold-file 80 --threshold-package 80 --threshold-total 95 --profile cover.out --config ./.testcoverage.yml"
  helm-unittest:
    cmds:
      - helm unittest chart
  validate:
    cmds:
      - task: lint
      - task: test
      - task: cover
  schemagen:
    cmds:
      - go generate ./...
  run:
    cmds:
      - go run ./main.go operator
  copynamespacedcrd:
    cmd: |
         cp -rf config/crd/bases/* config/out/
         yq -i '.spec.scope = "Namespaced"' ./config/out/ui.platform-mesh.io_contentconfigurations.yaml
         {{.SEDCMD}} '1s;^;\{\{ if not .Values.kcp.enabled \}\}\n;' ./config/out/ui.platform-mesh.io_contentconfigurations.yaml
         echo "{{ `{{- end }}` }}" >> ./config/out/ui.platform-mesh.io_contentconfigurations.yaml
  copytocharts:
    cmd: |
         cp -rf config/crd/bases/* config/out/
         yq -i '.spec.scope = "Namespaced"' ./config/out/core.openmfp.io_contentconfigurations.yaml
         {{.SEDCMD}} '1s;^;\{\{ if not .Values.kcp.enabled \}\}\n;' ./config/out/core.openmfp.io_contentconfigurations.yaml
         echo "{{ `{{- end }}` }}" >> ./config/out/core.openmfp.io_contentconfigurations.yaml

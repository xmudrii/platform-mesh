version: '3'

includes:
  # Shared go-installable tooling (controller-gen, golangci-lint, mockery,
  # apigen), installed once into the root bin/ and reused by every component.
  tools:
    taskfile: ../../tools/Taskfile.yaml
    dir: .

vars:
  CRD_DIRECTORY: config/crd

tasks:
  ## Development
  manifests:
    desc: Generate CRD manifests
    deps: [tools:controller-gen]
    cmds:
      - "{{.BIN}}/controller-gen rbac:roleName=manager-role crd paths=./... output:crd:artifacts:config={{.CRD_DIRECTORY}}"

  generate:
    desc: Generate code (deepcopy, manifests)
    deps: [tools:controller-gen]
    cmds:
      - task: manifests
      - "{{.BIN}}/controller-gen object:headerFile={{.HACK}}/boilerplate/boilerplate.go.txt paths=./..."

  generate:mocks:
    desc: Generate mocks using mockery
    deps: [tools:mockery]
    cmds:
      - "{{.BIN}}/mockery"

  build:
    desc: Build the operator binary
    cmds:
      - go build ./...

  docker-build:
    desc: Build the Docker image
    cmds:
      - docker build .

  ## Testing
  fmt:
    desc: Run go fmt
    cmds:
      - go fmt ./...

  lint:
    desc: Run linter
    cmds:
      - task: fmt
      - task: tools:lint

  test:
    cmds:
      - go test ./...
  test-e2e:
    deps: [tools:envtest]
    cmds:
      - |
        set -ex
        export KUBEBUILDER_ASSETS=$({{.BIN}}/setup-envtest use {{.ENVTEST_K8S_VERSION}} --bin-dir {{.BIN}} -p path)
        go test -tags integration ./... {{.ADDITIONAL_COMMAND_ARGS}}
  cover:
    cmds:
      - task: test
        vars:
          ADDITIONAL_COMMAND_ARGS: -v -coverprofile=./cover.out -covermode=atomic -coverpkg=./...
  cover-e2e:
    cmds:
      - task: test-e2e
        vars:
          ADDITIONAL_COMMAND_ARGS: -v -coverprofile=./cover.out -covermode=atomic -coverpkg=./...

  ## Run
  run:
    desc: Run the operator locally
    cmds:
      - go run main.go operator

  ## Docker
  docker:kind:
    desc: "Build container image and load it into Kind cluster, then restart deployments"
    vars:
      CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
      KIND_CLUSTER: '{{.KIND_CLUSTER | default "platform-mesh"}}'
      DEPLOYMENT_NAMESPACE: '{{.DEPLOYMENT_NAMESPACE | default "platform-mesh-system"}}'
      IMAGE_TAG:
        sh: kubectl get deployment kcp-migration-operator -n {{.DEPLOYMENT_NAMESPACE}} -o jsonpath='{.spec.template.spec.containers[0].image}' | cut -d':' -f2
      IMAGE_NAME: ghcr.io/platform-mesh/kcp-migration-operator:{{.IMAGE_TAG}}
    cmds:
      - echo "Building image with tag {{.IMAGE_TAG}} using {{.CONTAINER_RUNTIME}}"
      - "{{.CONTAINER_RUNTIME}} build -t {{.IMAGE_NAME}} ."
      - |
        if [ "{{.CONTAINER_RUNTIME}}" = "podman" ]; then
          {{.CONTAINER_RUNTIME}} save {{.IMAGE_NAME}} -o /tmp/kind-image.tar
          kind load image-archive /tmp/kind-image.tar --name {{.KIND_CLUSTER}}
          rm -f /tmp/kind-image.tar
        else
          kind load docker-image {{.IMAGE_NAME}} --name {{.KIND_CLUSTER}}
        fi
      - |
        echo "Restarting all kcp-migration-operator deployments..."
        kubectl get deployments -n {{.DEPLOYMENT_NAMESPACE}} -o name | grep kcp-migration-operator | xargs -I {} kubectl rollout restart {} -n {{.DEPLOYMENT_NAMESPACE}}
      - echo "Image loaded and deployments restarted"

all: false
force-file-write: true
formatter: goimports
log-level: info
recursive: false
require-template-schema-exists: true
template: testify
template-data:
  boilerplate-file: ../../hack/boilerplate/boilerplate.go.txt
packages:
  go.platform-mesh.io/kcp-migration-operator/internal/kcp:
    config:
      dir: pkg/mocks
      pkgname: mocks
    interfaces:
      WorkspaceClientFactory:
        config:
          filename: mock_workspace_client_factory.go
  sigs.k8s.io/controller-runtime/pkg/client:
    config:
      dir: pkg/mocks
      pkgname: mocks
    interfaces:
      Client:
        config:
          filename: mock_K8Client.go

# Sample multi-resource sync configuration
# This file demonstrates how to configure multiple resource types for synchronization

# kcp kubeconfig for connecting to kcp workspaces
kcpKubeconfigPath: /etc/kcp/kubeconfig

# Source cluster kubeconfig (optional, uses KUBECONFIG env var if not set)
# sourceKubeconfigPath: /etc/source/kubeconfig

# Directory containing template files
# Templates are loaded relative to this directory
templatesDir: .templates

# Resources to synchronize
resources:
  # Sync Accounts from source namespace to kcp org workspace
  - name: accounts-to-sap-org
    source:
      apiVersion: fabric.foundation.sap.com/v1alpha1
      kind: Account
      namespace: account-2bzns  # Only watch this namespace
    target:
      workspaceExpression: "root:orgs:sap"
    transform:
      templatePath: account-to-project.yaml
    performance:
      maxWorkers: 5
      rateLimitResourcesPerSecond: 100
      rateLimitBurst: 200

  # Sync Spaces to kcp project workspaces
  - name: spaces-to-projects
    source:
      apiVersion: fabric.foundation.sap.com/v1alpha1
      kind: Space
      # No namespace filter - watch all namespaces
    target:
      workspaceExpression: "root:orgs:sap:{{ .Source.metadata.namespace }}"
    transform:
      # Inline template example
      template: |
        apiVersion: core.platform-mesh.io/v1alpha1
        kind: Project
        metadata:
          name: "{{ index .Source.metadata "name" }}"
        spec:
          displayName: "{{ getFieldStr .Source "spec.displayName" }}"
    performance:
      maxWorkers: 3

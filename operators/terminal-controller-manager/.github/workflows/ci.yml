name: ci

on:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    uses: platform-mesh/.github/.github/workflows/job-golang-lint.yml@main
    with:
      useTask: true

  test:
    uses: platform-mesh/.github/.github/workflows/job-golang-test-source.yml@main
    with:
      useTask: true
      useLocalCoverageConfig: true

  docker-build:
    uses: platform-mesh/.github/.github/workflows/job-docker-build.yml@main
    with:
      imageTagName: ghcr.io/platform-mesh/terminal-controller-manager

  terminal-image-build:
    name: Build Terminal Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: images/terminal
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  quality-gate:
    if: always()
    permissions: {}
    needs: [lint, test, docker-build, terminal-image-build]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "lint failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test failed"
            exit 1
          fi
          if [[ "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "docker-build failed"
            exit 1
          fi
          if [[ "${{ needs.terminal-image-build.result }}" != "success" ]]; then
            echo "terminal-image-build failed"
            exit 1
          fi

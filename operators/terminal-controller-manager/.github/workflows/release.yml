name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  issues: write
  packages: write
  pull-requests: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    uses: platform-mesh/.github/.github/workflows/job-golang-lint.yml@main
    with:
      useTask: true

  test:
    uses: platform-mesh/.github/.github/workflows/job-golang-test-source.yml@main
    secrets: inherit
    with:
      useTask: true
      useLocalCoverageConfig: true

  create-version:
    uses: platform-mesh/.github/.github/workflows/job-create-version.yml@main
    secrets: inherit

  docker-build-push:
    needs: [create-version, lint, test]
    uses: platform-mesh/.github/.github/workflows/job-docker-build-push.yml@main
    with:
      imageTagName: ghcr.io/platform-mesh/terminal-controller-manager
      version: ${{ needs.create-version.outputs.version }}
      multiarch: true
    secrets: inherit

  terminal-image-build-push:
    name: Build and Push Terminal Image
    needs: [create-version]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/platform-mesh/terminal
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ needs.create-version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/terminal
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-version:
    needs: [create-version, docker-build-push]
    uses: platform-mesh/.github/.github/workflows/job-chart-version-update.yml@main
    secrets: inherit
    with:
      chart: terminal-controller-manager
      appVersion: ${{ needs.create-version.outputs.version }}
      targetRepository: platform-mesh/helm-charts

  sbom:
    needs: [create-version, docker-build-push]
    uses: platform-mesh/.github/.github/workflows/job-sbom.yml@main
    with:
      imageReference: ghcr.io/platform-mesh/terminal-controller-manager:${{ needs.create-version.outputs.version }}

  image-ocm:
    needs: [create-version, docker-build-push, sbom]
    uses: platform-mesh/.github/.github/workflows/job-image-ocm.yml@main
    secrets: inherit
    with:
      imageReference: ghcr.io/platform-mesh/terminal-controller-manager:${{ needs.create-version.outputs.version }}
      appVersion: ${{ needs.create-version.outputs.version }}
      repoName: terminal-controller-manager
      commit: ${{ github.sha }}

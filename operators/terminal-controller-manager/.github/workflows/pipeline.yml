name: ci

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: write
  id-token: write
  issues: write
  packages: write
  pull-requests: write

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: platform-mesh/.github/.github/workflows/job-golang-lint.yml@main
    with:
      useTask: true

  test:
    uses: platform-mesh/.github/.github/workflows/job-golang-test-source.yml@main
    secrets: inherit
    with:
      useTask: true
      useLocalCoverageConfig: true

  docker-build:
    if: github.event_name == 'pull_request'
    uses: platform-mesh/.github/.github/workflows/job-docker-build-push.yml@main
    with:
      imageTagName: ghcr.io/platform-mesh/terminal-controller-manager
    secrets: inherit

  terminal-image-build:
    name: Build Terminal Image
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: images/terminal
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  quality-gate:
    if: always()
    permissions: {}
    needs: [lint, test, docker-build, terminal-image-build]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "lint failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test failed"
            exit 1
          fi
          # docker-build and terminal-image-build are skipped on main pushes — allow skipped
          if [[ "${{ needs.docker-build.result }}" != "success" && "${{ needs.docker-build.result }}" != "skipped" ]]; then
            echo "docker-build failed"
            exit 1
          fi
          if [[ "${{ needs.terminal-image-build.result }}" != "success" && "${{ needs.terminal-image-build.result }}" != "skipped" ]]; then
            echo "terminal-image-build failed"
            exit 1
          fi

  create-version:
    if: github.ref == 'refs/heads/main'
    uses: platform-mesh/.github/.github/workflows/job-create-version.yml@main
    secrets: inherit

  docker-build-push:
    if: github.ref == 'refs/heads/main'
    needs: [create-version, lint, test]
    uses: platform-mesh/.github/.github/workflows/job-docker-build-push.yml@main
    with:
      imageTagName: ghcr.io/platform-mesh/terminal-controller-manager
      version: ${{ needs.create-version.outputs.version }}
      multiarch: true
    secrets: inherit

  terminal-image-build-push:
    name: Build and Push Terminal Image
    if: github.ref == 'refs/heads/main'
    needs: [create-version]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/platform-mesh/terminal
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ needs.create-version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/terminal
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-version:
    if: github.ref == 'refs/heads/main'
    needs: [create-version, docker-build-push]
    uses: platform-mesh/.github/.github/workflows/job-chart-version-update.yml@main
    secrets: inherit
    with:
      chart: terminal-controller-manager
      appVersion: ${{ needs.create-version.outputs.version }}
      targetRepository: platform-mesh/helm-charts

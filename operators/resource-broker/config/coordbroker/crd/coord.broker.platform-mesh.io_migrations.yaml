---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: migrations.coord.broker.platform-mesh.io
spec:
  group: coord.broker.platform-mesh.io
  names:
    kind: Migration
    listKind: MigrationList
    plural: migrations
    singular: migration
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.from.providerCluster
      name: From
      type: string
    - jsonPath: .spec.to.providerCluster
      name: To
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Migration moves a brokered resource from one provider to another.
          The broker creates one when the assigned provider no longer accepts
          the resource. The object name is a deterministic hash of the same
          tuple as the Assignment name (consumerCluster, gvr, namespace, name).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MigrationSpec defines the desired state of Migration.
            properties:
              assignment:
                description: Assignment is the name of the Assignment being migrated.
                minLength: 1
                type: string
              from:
                description: |-
                  From is the provider the resource is migrated away from,
                  a snapshot of the assignment at migration start.
                properties:
                  acceptAPIName:
                    description: |-
                      AcceptAPIName is the name of the AcceptAPI object in the provider
                      workspace.
                    minLength: 1
                    type: string
                  gvk:
                    description: GVK is the GroupVersionKind of the resource at this
                      provider.
                    properties:
                      group:
                        type: string
                      kind:
                        type: string
                      version:
                        type: string
                    required:
                    - group
                    - kind
                    - version
                    type: object
                  providerCluster:
                    description: |-
                      ProviderCluster is the logical cluster name of the provider
                      workspace.
                    minLength: 1
                    type: string
                required:
                - acceptAPIName
                - gvk
                - providerCluster
                type: object
              to:
                description: To is the provider the resource is migrated to.
                properties:
                  acceptAPIName:
                    description: |-
                      AcceptAPIName is the name of the AcceptAPI object in the provider
                      workspace.
                    minLength: 1
                    type: string
                  gvk:
                    description: GVK is the GroupVersionKind of the resource at this
                      provider.
                    properties:
                      group:
                        type: string
                      kind:
                        type: string
                      version:
                        type: string
                    required:
                    - group
                    - kind
                    - version
                    type: object
                  providerCluster:
                    description: |-
                      ProviderCluster is the logical cluster name of the provider
                      workspace.
                    minLength: 1
                    type: string
                required:
                - acceptAPIName
                - gvk
                - providerCluster
                type: object
            required:
            - assignment
            - from
            - to
            type: object
          status:
            description: MigrationStatus defines the observed state of Migration.
            properties:
              conditions:
                description: |-
                  Conditions represent the current state of the Migration.
                  Condition types are StagingWorkspaceReady, StagesCompleted,
                  CutoverCompleted and Ready.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              fromStagingWorkspace:
                description: |-
                  FromStagingWorkspace is the name of the StagingWorkspace object
                  the assignment was served through at migration start.
                type: string
              stage:
                description: |-
                  Stage is the name of the current stage from the matching
                  MigrationConfiguration.
                type: string
              stagingWorkspace:
                description: |-
                  StagingWorkspace is the name of the StagingWorkspace object
                  serving the target provider.
                type: string
              state:
                description: State represents the current state of the migration process.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

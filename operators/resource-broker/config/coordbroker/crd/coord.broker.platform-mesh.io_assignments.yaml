apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: assignments.coord.broker.platform-mesh.io
spec:
  group: coord.broker.platform-mesh.io
  names:
    kind: Assignment
    listKind: AssignmentList
    plural: assignments
    singular: assignment
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.providerCluster
      name: Provider
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Assignment records the sticky assignment of a single consumer resource
          to a provider. The broker creates one per brokered resource and never
          re-evaluates the provider choice while the assignment exists. The
          object name is a deterministic hash of
          (consumerCluster, gvr, namespace, name).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AssignmentSpec defines the desired state of Assignment.
            properties:
              acceptAPIName:
                description: |-
                  AcceptAPIName is the name of the AcceptAPI object in the provider
                  workspace that accepted the resource.
                minLength: 1
                type: string
              consumerCluster:
                description: |-
                  ConsumerCluster is the logical cluster name of the consumer
                  workspace the resource lives in.
                minLength: 1
                type: string
              gvr:
                description: GVR is the GroupVersionResource of the assigned resource.
                properties:
                  group:
                    type: string
                  resource:
                    type: string
                  version:
                    type: string
                required:
                - group
                - resource
                - version
                type: object
              name:
                description: Name is the name of the resource in the consumer workspace.
                minLength: 1
                type: string
              namespace:
                description: |-
                  Namespace is the namespace of the resource in the consumer
                  workspace. Empty for cluster-scoped resources.
                type: string
              providerCluster:
                description: |-
                  ProviderCluster is the logical cluster name of the provider
                  workspace the resource is assigned to.
                minLength: 1
                type: string
            required:
            - acceptAPIName
            - consumerCluster
            - gvr
            - name
            - providerCluster
            type: object
          status:
            description: AssignmentStatus defines the observed state of Assignment.
            properties:
              conditions:
                description: Conditions represent the current state of the Assignment.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: Phase is the current lifecycle phase.
                type: string
              stagingWorkspace:
                description: |-
                  StagingWorkspace is the name of the StagingWorkspace object the
                  assignment is served through.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: resource-broker
rules:
- apiGroups:
  - coord.broker.platform-mesh.io
  resources:
  - assignments
  - migrations
  - stagingworkspaces
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - coord.broker.platform-mesh.io
  resources:
  - assignments/finalizers
  - migrationconfigurations/finalizers
  - migrations/finalizers
  - stagingworkspaces/finalizers
  verbs:
  - update
- apiGroups:
  - coord.broker.platform-mesh.io
  resources:
  - assignments/status
  - migrations/status
  - stagingworkspaces/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - coord.broker.platform-mesh.io
  resources:
  - migrationconfigurations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - coord.broker.platform-mesh.io
  resources:
  - migrationconfigurations/status
  verbs:
  - get

<div class="services-layout">
  <!-- Side Navigation -->
  <nav class="side-nav">
    <div class="nav-header">
      <ui5-icon name="customer" class="nav-header-icon"></ui5-icon>
      <ui5-title level="H5">Services</ui5-title>
    </div>

    <div class="nav-content">
      @for (category of categories(); track category.name) {
        <div class="nav-category">
          <div class="category-header" (click)="toggleCategory(category.name)">
            <ui5-icon [name]="category.icon" class="category-icon"></ui5-icon>
            <span class="category-name">{{ category.name }}</span>
            <ui5-icon
              [name]="isCategoryExpanded(category.name) ? 'navigation-down-arrow' : 'navigation-right-arrow'"
              class="expand-icon">
            </ui5-icon>
          </div>

          @if (isCategoryExpanded(category.name)) {
            <div class="category-items">
              @for (resource of category.resources; track resource.kind) {
                <div
                  class="nav-item"
                  [class.selected]="isResourceSelected(resource)"
                  (click)="selectResource(resource)">
                  <span class="item-label">{{ resource.plural }}</span>
                </div>
              }
            </div>
          }
        </div>
      }
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>

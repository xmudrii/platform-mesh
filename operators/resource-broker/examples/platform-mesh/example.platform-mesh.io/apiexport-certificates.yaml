apiVersion: apis.kcp.io/v1alpha2
kind: APIExport
metadata:
  name: example.platform-mesh.io
  labels:
    ui.platform-mesh.io/content-for: example.platform-mesh.io
spec:
  resources:
    - group: example.platform-mesh.io
      name: certificates
      schema: current.certificates.example.platform-mesh.io
      storage:
        crd: {}
  # permissionClaims:
  #   - resource: secrets
  #     verbs:
  #       - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: certificates-apiexport-bind
rules:
  - apiGroups:
      - apis.kcp.io
    resources:
      - apiexports
    verbs:
      - bind
    resourceNames:
      - example.platform-mesh.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: certificates-anonymous-bind
subjects:
  - kind: User
    name: system:anonymous
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: certificates-apiexport-bind
  apiGroup: rbac.authorization.k8s.io

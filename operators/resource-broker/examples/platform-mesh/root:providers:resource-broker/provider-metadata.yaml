apiVersion: ui.platform-mesh.io/v1alpha1
kind: ProviderMetadata
metadata:
  name: generic.platform-mesh.io
spec:
  displayName: Generic APIs Broker
  description: |
    This provider offers generic APIs for resources such as managed certificates and virtual machines.
    It serves as a bridge to integrate various resource types into the Platform Mesh ecosystem, 
    enabling users to manage and interact with these resources through a unified interface.
  contacts:
  - displayName: Platform Mesh Team
    email: resource-broker@platform-mesh.io
    role: ["Maintainer"]
  preferredSupportChannels:
  - displayName: Resource Broker Project
    url: https://github.com/platform-mesh/resource-broker
  icon:
    light:
      data: "data:image/svg+xml;base64,"
    dark:
      data: "data:image/svg+xml;base64,"

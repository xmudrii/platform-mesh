version: '2'

run:
  timeout: 5m
  allow-parallel-runners: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  enable:
    - asasalint
    - bodyclose
    - containedctx
    - dupl
    - errchkjson
    - errname
    - fatcontext
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gosec
    - noctx
    - paralleltest
    - revive
    - unparam
  exclusions:
    generated: lax
    rules:
      - path: test/
        linters:
          - gosec
        text: "G204" # subprocess launched with variable
      - path: test/
        linters:
          - gosec
        text: "G304" # potential file inclusion via variable
      - path: test/
        linters:
          - goconst
        text: "make it a constant" # test strings are fine, esp. when they are from different tests they shouldn't be shared.
      - path: _test\.go$
        linters:
          - goconst
      - path: test/utils/
        linters:
          - revive
        text: "var-naming" # the package name `utils` is fine here

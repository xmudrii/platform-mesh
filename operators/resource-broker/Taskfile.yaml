version: '3'

includes:
  # Shared go-installable tooling (controller-gen, golangci-lint, mockery,
  # apigen), installed once into the root bin/ and reused by every component.
  tools:
    taskfile: ../../tools/Taskfile.yaml
    dir: .

tasks:
  ## Development
  manifests:
    desc: Generate CRD manifests
    cmds:
      - task: tools:generate-crds
        vars: { PATH: /broker/..., OUTPUT: config/broker/crd }
      - task: tools:generate-crds
        vars: { PATH: /coordbroker/..., OUTPUT: config/coordbroker/crd }
      - task: tools:generate-crds
        vars: { BASEDIR: './api', PATH: /generic/..., OUTPUT: config/generic/crd }
      - task: tools:generate-crds
        vars: { BASEDIR: './api', PATH: /example/..., OUTPUT: config/example/crd }

      - task: tools:generate-rbac
        vars: { PATHS: '{{.TOPLEVEL}}/apis/broker/...', OUTPUT: config/broker/rbac, ROLE: resource-broker }
      - task: tools:generate-rbac
        vars: { PATHS: '{{.TOPLEVEL}}/apis/coordbroker/...', OUTPUT: config/coordbroker/rbac, ROLE: resource-broker }
      - task: tools:generate-rbac
        vars: { PATHS: ./api/generic/..., OUTPUT: config/generic/rbac, ROLE: resource-broker }
      - task: tools:generate-rbac
        vars: { PATHS: ./api/example/..., OUTPUT: config/example/rbac, ROLE: resource-broker-example }

  generate:
    desc: Generate code (deepcopy, manifests)
    cmds:
      - task: manifests
      - task: tools:generate-deepcopy
        vars: { BASEDIR: './api', PATH: /generic/... }
      - task: tools:generate-deepcopy
        vars: { BASEDIR: './api', PATH: /example/... }
      - task: e2e-fixtures

  e2e-fixtures:
    desc: Generate kcp fixtures (APIResourceSchemas, APIExports) for the e2e suite
    deps: [tools:apigen]
    cmds:
      # apigen chokes on kustomization.yaml, so stage the CRDs in a tmp dir.
      - |
        set -e
        tmp=$(mktemp -d)
        trap 'rm -rf "$tmp"' EXIT
        cp config/broker/crd/broker.platform-mesh.io_acceptapis.yaml "$tmp"
        cp config/example/crd/example.platform-mesh.io_certificates.yaml "$tmp"
        cp config/example/crd/example.platform-mesh.io_dnszones.yaml "$tmp"
        cp config/example/crd/example.platform-mesh.io_vms.yaml "$tmp"
        {{.BIN}}/apigen --input-dir "$tmp" --output-dir test/e2e/setup --header-file {{.HACK}}/boilerplate/boilerplate.yaml.txt

  build:
    desc: Build the module
    cmds:
      - go build ./...

  docker-build:
    desc: Build the Docker image
    vars:
      IMG: '{{.IMG | default "localhost/resource-broker:dev"}}'
    cmds:
      - docker build -t {{.IMG}} -f Dockerfile ../../

  kind-load:
    desc: Load the Docker image into a kind cluster
    vars:
      IMG: '{{.IMG | default "localhost/resource-broker:dev"}}'
      KIND_CLUSTER: '{{.KIND_CLUSTER | default "kind"}}'
    cmds:
      - kind load docker-image --name {{.KIND_CLUSTER}} {{.IMG}}

  ## Examples
  example-*:
    desc: Run an example (extracts the ci blocks from its README)
    vars:
      EXAMPLE: '{{index .MATCH 0}}'
    cmds:
      - defer: rm -f run.bash
      - go run github.com/ntnn/mdextract@main -output run.bash -tags bash,ci ./examples/{{.EXAMPLE}}/README.md
      - bash -xe ./run.bash

  examples:
    desc: Run all examples
    cmds:
      - task: example-broker-certificates

  ## Testing
  fmt:
    desc: Run go fmt
    cmds:
      - go fmt ./...

  lint:
    desc: Run linter
    cmds:
      - task: fmt
      - task: tools:lint

  test:
    cmds:
      - go test ./pkg/...
  test-e2e:
    deps: [tools:kcp]
    env:
      TEST_KCP_ASSETS: '{{.BIN}}'
    cmds:
      - go test -count=1 ./test/e2e/... {{.ADDITIONAL_COMMAND_ARGS}}
  cover:
    cmds:
      - task: test
        vars:
          ADDITIONAL_COMMAND_ARGS: -v -coverprofile=./cover.out -covermode=atomic -coverpkg=./...
  cover-e2e:
    cmds:
      - task: test-e2e
        vars:
          ADDITIONAL_COMMAND_ARGS: -v -coverprofile=./cover.out -covermode=atomic -coverpkg=./...

  ## Docker
  docker:kind:
    desc: "Build container image and load it into Kind cluster, then restart deployments"
    vars:
      CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
      KIND_CLUSTER: '{{.KIND_CLUSTER | default "platform-mesh"}}'
      DEPLOYMENT_NAMESPACE: '{{.DEPLOYMENT_NAMESPACE | default "platform-mesh-system"}}'
      IMAGE_TAG:
        sh: kubectl get deployment resource-broker -n {{.DEPLOYMENT_NAMESPACE}} -o jsonpath='{.spec.template.spec.containers[0].image}' | cut -d':' -f2
      IMAGE_NAME: ghcr.io/platform-mesh/resource-broker:{{.IMAGE_TAG}}
    cmds:
      - echo "Building image with tag {{.IMAGE_TAG}} using {{.CONTAINER_RUNTIME}}"
      - "{{.CONTAINER_RUNTIME}} build -t {{.IMAGE_NAME}} ."
      - |
        if [ "{{.CONTAINER_RUNTIME}}" = "podman" ]; then
          {{.CONTAINER_RUNTIME}} save {{.IMAGE_NAME}} -o /tmp/kind-image.tar
          kind load image-archive /tmp/kind-image.tar --name {{.KIND_CLUSTER}}
          rm -f /tmp/kind-image.tar
        else
          kind load docker-image {{.IMAGE_NAME}} --name {{.KIND_CLUSTER}}
        fi
      - |
        echo "Restarting all resource-broker deployments..."
        kubectl get deployments -n {{.DEPLOYMENT_NAMESPACE}} -o name | grep resource-broker | xargs -I {} kubectl rollout restart {} -n {{.DEPLOYMENT_NAMESPACE}}
      - echo "Image loaded and deployments restarted"

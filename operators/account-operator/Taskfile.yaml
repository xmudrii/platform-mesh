version: '3'

includes:
  # Shared go-installable tooling (controller-gen, golangci-lint, mockery,
  # apigen), installed once into the root bin/ and reused by every component.
  tools:
    taskfile: ../../tools/Taskfile.yaml
    dir: .

vars:
  CRD_DIRECTORY: config/crd
  TEST_SETUP_DIRECTORY: test/setup/01-platform-mesh-system

tasks:
  ## Development
  manifests:
    cmds:
      - task: tools:generate-crds
        vars:
          PATH: /core/...
          OUTPUT: '{{.CRD_DIRECTORY}}'
  generate:
    cmds:
      - task: manifests
      - task: tools:generate-deepcopy
        vars:
          PATH: /core/...
      - "{{.BIN}}/apigen --input-dir {{.CRD_DIRECTORY}} --output-dir ./config/resources --header-file {{.HACK}}/boilerplate/boilerplate.yaml.txt"
      - "{{.BIN}}/apigen --input-dir {{.CRD_DIRECTORY}} --output-dir {{ .TEST_SETUP_DIRECTORY }} --header-file {{.HACK}}/boilerplate/boilerplate.yaml.txt"
  generate:mocks:
    desc: Generate mocks using mockery
    deps: [tools:mockery]
    cmds:
      - "{{.BIN}}/mockery"
  build:
    desc: Build the account-operator.
    cmds:
      - go build ./...
  docker-build:
    cmds:
      - docker build .
  ## Testing
  fmt:
    cmds:
      - go fmt ./...
  lint:
    cmds:
      - task: fmt
      - task: tools:lint
  # Integration (envtest) lives in ./internal/controller; everything else is unit.
  test:
    desc: Run unit tests (no kcp/envtest).
    cmds:
      - go test -count=1 $(go list ./... | grep -v '/internal/controller$')
  test-e2e:
    desc: Run envtest integration tests (uses the shared kcp from the root bin).
    deps: [tools:kcp]
    env:
      TEST_KCP_ASSETS: '{{.BIN}}'
    cmds:
      - go test -count=1 ./internal/controller/... {{.ADDITIONAL_COMMAND_ARGS}}
  cover:
    deps: [tools:kcp]
    env:
      TEST_KCP_ASSETS: '{{.BIN}}'
    cmds:
      - go test -count=1 ./... -v -coverprofile=./cover.out -covermode=atomic -coverpkg=./...
  start-kcp:
    deps: [tools:kcp]
    cmds:
      - "{{.BIN}}/kcp start"

  fuzz:
    desc: "Run fuzz tests with a configurable duration (default 30s per target)"
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - go test ./api/v1alpha1/ -run=^$ -fuzz=FuzzAccountRoundTrip -fuzztime={{.FUZZTIME}} -count=1
      - go test ./api/v1alpha1/ -run=^$ -fuzz=FuzzAccountInfoRoundTrip -fuzztime={{.FUZZTIME}} -count=1
      - go test ./api/v1alpha1/ -run=^$ -fuzz=FuzzAccountValidateCreate -fuzztime={{.FUZZTIME}} -count=1
      - go test ./api/v1alpha1/ -run=^$ -fuzz=FuzzAccountValidateUpdate -fuzztime={{.FUZZTIME}} -count=1

  docker:kind:
    desc: "Build container image with current tag from kind cluster and load it"
    vars:
      CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
      KIND_CLUSTER: '{{.KIND_CLUSTER | default "platform-mesh"}}'
      DEPLOYMENT_NAME: '{{.DEPLOYMENT_NAME | default "account-operator"}}'
      DEPLOYMENT_NAMESPACE: '{{.DEPLOYMENT_NAMESPACE | default "platform-mesh-system"}}'
      IMAGE_TAG:
        sh: kubectl get deployment {{.DEPLOYMENT_NAME}} -n {{.DEPLOYMENT_NAMESPACE}} -o jsonpath='{.spec.template.spec.containers[0].image}' | cut -d':' -f2
      IMAGE_NAME: ghcr.io/platform-mesh/account-operator:{{.IMAGE_TAG}}
    cmds:
      - echo "Building image with tag {{.IMAGE_TAG}} using {{.CONTAINER_RUNTIME}}"
      - "{{.CONTAINER_RUNTIME}} build -t {{.IMAGE_NAME}} ."
      - |
        if [ "{{.CONTAINER_RUNTIME}}" = "podman" ]; then
          {{.CONTAINER_RUNTIME}} save {{.IMAGE_NAME}} -o /tmp/kind-image.tar
          kind load image-archive /tmp/kind-image.tar --name {{.KIND_CLUSTER}}
          rm -f /tmp/kind-image.tar
        else
          kind load docker-image {{.IMAGE_NAME}} --name {{.KIND_CLUSTER}}
        fi
      - kubectl rollout restart deployment/{{.DEPLOYMENT_NAME}} -n {{.DEPLOYMENT_NAMESPACE}}
      - echo "Image loaded and deployment restarted"

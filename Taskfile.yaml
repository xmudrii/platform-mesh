version: "3"

# Root Taskfile for the platform-mesh monorepo.
#
# Structure:
#   * Global targets (`lint`, `test`, `test-e2e`, `generate`, `build`) run the
#     matching target for EVERY component.
#   * Per-component targets (`lint-<name>`, `test-<name>`, ...) run it for ONE
#     component, e.g. `task lint-account-operator`.
#
# Every component (module/service) must expose the standard targets in its own
# Taskfile: lint, test, test-e2e, generate, build. The root simply fans out to
# them, so component-specific setup (kcp/envtest, codegen tools, ...) lives with
# the component.
#
# The components below are linked locally through the repository-root go.work
# file. Add a component by listing its name here; its directory is discovered
# under ./, ./operators/ or ./services/.

includes:
  # Shared go-installable tooling (controller-gen, golangci-lint, mockery,
  # apigen), installed once into the root bin/ and reused by every component.
  tools:
    taskfile: tools/Taskfile.yaml
    dir: .

vars:
  COMPONENTS:
    # shared
    - apis
    - subroutines
    - golang-commons

    # operators
    - account-operator
    - backup-operator
    - extension-manager-operator
    - kcp-migration-operator
    - search-operator
    - security-operator
    - terminal-controller-manager

    # services
    - iam-service
    - kubernetes-graphql-gateway
    - rebac-authz-webhook
    - search-service
    - virtual-workspaces

tasks:
  default:
    cmds:
      - task --list

  # ---------------------------------------------------------------------------
  # Global fan-out targets: run the standard target across all components.
  # ---------------------------------------------------------------------------
  verify:
    desc: Runs all check targets in sequence.
    cmds:
      - task: lint
      - task: boilerplate
      - task: tidy-check
  lint:
    desc: Lint every component.
    cmds:
      - for: {var: COMPONENTS}
        cmd: task lint-{{.ITEM}}
  tidy-check:
    desc: Each go.mod must be self-contained (tidy + deps resolve without go.work).
    cmds:
      - for: {var: COMPONENTS}
        cmd: task tidy-check-{{.ITEM}}
  boilerplate:
    desc: Verifies the boilerplate comment in each source file.
    cmds:
      - |
        # --skip args from hack/boilerplate/skip.txt, ignoring blank lines and '#' comment lines.
        skip_args=$(grep -vE '^[[:space:]]*(#|$)' hack/boilerplate/skip.txt | sed 's/^/--skip /' | tr '\n' ' ')
        ./hack/verify_boilerplate.py --boilerplate-dir hack/boilerplate/ $skip_args
  test:
    desc: Run unit tests for every component.
    cmds:
      - for: {var: COMPONENTS}
        cmd: task test-{{.ITEM}}
  test-e2e:
    desc: Run e2e/integration tests for every component.
    cmds:
      - for: {var: COMPONENTS}
        cmd: task test-e2e-{{.ITEM}}
  generate:
    desc: Run code generation for every component.
    cmds:
      - for: {var: COMPONENTS}
        cmd: task generate-{{.ITEM}}
  build:
    desc: Build every component.
    cmds:
      - for: {var: COMPONENTS}
        cmd: task build-{{.ITEM}}
  images:
    desc: 'Build container images for every component that ships a Dockerfile (VERSION=, PUSH=, PLATFORMS= to override).'
    cmds:
      - for: {var: COMPONENTS}
        task: images-{{.ITEM}}
        vars:
          REGISTRY: '{{.REGISTRY}}'
          REPO: '{{.REPO}}'
          VERSION: '{{.VERSION}}'
          PUSH: '{{.PUSH}}'
          PLATFORMS: '{{.PLATFORMS}}'

  # ---------------------------------------------------------------------------
  # Per-component targets. Each delegates to the component's own Taskfile.
  # `test-e2e-*` is declared before `test-*` so the more specific pattern wins.
  # ---------------------------------------------------------------------------
  "test-e2e-*":
    desc: "Run e2e tests for one component (e.g. task test-e2e-account-operator)."
    cmds:
      - task: _run
        vars: {COMPONENT: "{{index .MATCH 0}}", TARGET: test-e2e}
  "test-*":
    desc: "Run unit tests for one component (e.g. task test-account-operator)."
    cmds:
      - task: _run
        vars: {COMPONENT: "{{index .MATCH 0}}", TARGET: test}
  "lint-*":
    desc: "Lint one component (e.g. task lint-account-operator)."
    cmds:
      - task: _run
        vars: {COMPONENT: "{{index .MATCH 0}}", TARGET: lint}
  "generate-*":
    desc: "Run code generation for one component (e.g. task generate-account-operator)."
    deps: [tools:controller-gen, tools:apigen, tools:mockery]
    cmds:
      - task: _run
        vars: {COMPONENT: "{{index .MATCH 0}}", TARGET: generate}
  "build-*":
    desc: "Build one component (e.g. task build-account-operator)."
    cmds:
      - task: _run
        vars: {COMPONENT: "{{index .MATCH 0}}", TARGET: build}
  "tidy-check-*":
    desc: "Verify one module is self-contained (e.g. task tidy-check-apis)."
    env:
      GOWORK: "off"
    cmds:
      - |
        comp='{{index .MATCH 0}}'
        dir=$(ls -d "$comp" "operators/$comp" "services/$comp" 2>/dev/null | head -1)
        if [ -z "$dir" ]; then
          echo "unknown component '$comp' (not under ./, ./operators/ or ./services/)" >&2
          exit 1
        fi
        cd "$dir" && go mod tidy -diff && go list -m all >/dev/null
  "boilerplate-*":
    desc: "Verify boilerplate for one component (e.g. task boilerplate-apis)."
    cmds:
      - |
        comp='{{index .MATCH 0}}'
        dir=$(ls -d "$comp" "operators/$comp" "services/$comp" 2>/dev/null | head -1)
        if [ -z "$dir" ]; then
          echo "unknown component '$comp' (not under ./, ./operators/ or ./services/)" >&2
          exit 1
        fi
        root=$PWD
        # --skip args from hack/boilerplate/skip.txt, ignoring blank lines and '#' comment lines.
        skip_args=$(grep -vE '^[[:space:]]*(#|$)' "$root/hack/boilerplate/skip.txt" | sed 's/^/--skip /' | tr '\n' ' ')
        cd "$dir" && "$root/hack/verify_boilerplate.py" --boilerplate-dir "$root/hack/boilerplate/" $skip_args
  "verify-*":
    desc: "Run all checks for one component (e.g. task verify-account-operator)."
    cmds:
      - task: lint-{{index .MATCH 0}}
      - task: tidy-check-{{index .MATCH 0}}
      # TODO: Currently lots of files do not have the correct boilerplate.
      # - task: boilerplate-{{index .MATCH 0}}
  "images-*":
    desc: "Build (and optionally push) one component's image (e.g. task images-account-operator VERSION=v0.1.0 PUSH=true)."
    vars:
      # Defaults match the release pipeline's image naming; override on the CLI.
      REGISTRY: '{{.REGISTRY | default "ghcr.io"}}'
      REPO: '{{.REPO | default "platform-mesh/platform-mesh"}}'   # ghcr namespace: <registry>/<repo>/<name>
      VERSION: '{{.VERSION | default "dev"}}'                     # image tag; also pushed without leading "v"
      PUSH: '{{.PUSH | default "false"}}'                          # true -> buildx --push, false -> --load
      PLATFORMS: '{{.PLATFORMS | default "linux/amd64"}}'          # multi-arch (e.g. linux/amd64,linux/arm64) requires PUSH=true
      CONTEXT: '{{.CONTEXT | default "."}}'                         # build context; repo root by default (shared go.work)
      METADATA_FILE: '{{.METADATA_FILE | default ""}}'             # write buildx metadata (incl. containerimage.digest) here for signing
    cmds:
      - task: _image
        vars:
          COMPONENT: "{{index .MATCH 0}}"
          REGISTRY: "{{.REGISTRY}}"
          REPO: "{{.REPO}}"
          VERSION: "{{.VERSION}}"
          PUSH: "{{.PUSH}}"
          PLATFORMS: "{{.PLATFORMS}}"
          CONTEXT: "{{.CONTEXT}}"
          METADATA_FILE: "{{.METADATA_FILE}}"

  # Resolve a component name to its directory and delegate to its Taskfile.
  _run:
    internal: true
    silent: true
    cmds:
      - |
        comp='{{.COMPONENT}}'; target='{{.TARGET}}'
        dir=''
        for p in "$comp" "operators/$comp" "services/$comp"; do
          if [ -f "$p/Taskfile.yaml" ] || [ -f "$p/Taskfile.yml" ]; then dir="$p"; break; fi
        done
        if [ -z "$dir" ]; then
          echo "unknown component '$comp' (no Taskfile under ./, ./operators/ or ./services/)" >&2
          exit 1
        fi
        task --dir "$dir" "$target"

  # Build (and optionally push) a single component image. Mirrors how the release
  # workflows build the operator images (root context + shared go.work), so a
  # local `task images-<name>` reproduces the CI image.
  _image:
    internal: true
    silent: true
    cmds:
      - |
        set -eu
        comp='{{.COMPONENT}}'
        dir=''
        for p in "$comp" "operators/$comp" "services/$comp"; do
          if [ -d "$p" ]; then dir="$p"; break; fi
        done
        if [ -z "$dir" ]; then
          echo "unknown component '$comp' (not under ./, ./operators/ or ./services/)" >&2
          exit 1
        fi
        # apis and other code-only modules ship no Dockerfile — skip, don't fail,
        # so the `images` fan-out can iterate every component.
        if [ ! -f "$dir/Dockerfile" ]; then
          echo ">> $comp: no Dockerfile in $dir — skipping image build"
          exit 0
        fi

        version='{{.VERSION}}'
        image='{{.REGISTRY}}/{{.REPO}}'/"$comp"

        # Build context is the repo ROOT: the operator Dockerfiles use the shared
        # go.work + apis module, so they COPY root-relative paths. A self-contained
        # component can override with CONTEXT=<dir>.
        context='{{.CONTEXT | default "."}}'

        push_flag='--load'
        [ '{{.PUSH}}' = 'true' ] && push_flag='--push'

        # Single tag: image:VERSION (e.g. v0.1.0, latest, pr-N, dev).
        set -- -t "$image:$version"

        # Optional: emit buildx metadata (incl. containerimage.digest) so callers
        # like the release workflow can cosign-sign the pushed image by digest.
        meta='{{.METADATA_FILE}}'
        [ -n "$meta" ] && set -- "$@" --metadata-file "$meta"

        echo ">> building $image:$version (context=$context platforms={{.PLATFORMS}} push={{.PUSH}})"
        docker buildx build \
          --file "$dir/Dockerfile" \
          --platform '{{.PLATFORMS}}' \
          "$push_flag" \
          "$@" \
          "$context"

  # ---------------------------------------------------------------------------
  # Release: cut a per-component semver tag (cmd/release). The tag (<name>/v*)
  # triggers that component's release workflow (e.g. account-operator.yml), which
  # builds + signs the image, cuts a GitHub release, bumps the chart and publishes
  # SBOM + OCM. `apis` tags are go-gettable module tags only. Pass component +
  # flags after `--`, e.g.:
  #   task release -- account-operator --minor
  #   task release -- all --dry-run
  # ---------------------------------------------------------------------------
  release:
    desc: 'Cut a release tag for a component (e.g. task release -- account-operator --minor).'
    dir: cmd/release
    env:
      GOWORK: "off"   # cmd/release is a standalone tool module, not in the workspace.
    cmds:
      - go run . {{.CLI_ARGS}}

  # Point every consumer at a released version of an internal module. Generic
  # over the module: the component's own go.mod supplies the module path, so the
  # same target works for apis, golang-commons, subroutines, ... — nothing is
  # hardcoded. `cmd/release` prints the exact invocation after tagging such a
  # module; run it, then commit the resulting go.mod/go.sum changes.
  #   task bump-deps -- apis v0.0.1
  bump-deps:
    desc: 'Point every consumer at a released internal-module version (e.g. task bump-deps -- apis v0.0.1).'
    env:
      GOWORK: "off"   # resolve the published version from the proxy, not the local workspace copy.
    cmds:
      - |
        set -eu
        comp=$(printf '%s\n' {{.CLI_ARGS}} | sed -n 1p)
        version=$(printf '%s\n' {{.CLI_ARGS}} | sed -n 2p)
        if [ -z "$comp" ] || [ -z "$version" ]; then
          echo "usage: task bump-deps -- <component> <version>   e.g. task bump-deps -- apis v0.0.1" >&2
          exit 1
        fi
        dir=$(ls -d "$comp" "operators/$comp" "services/$comp" 2>/dev/null | head -1)
        if [ -z "$dir" ]; then
          echo "unknown component '$comp' (not under ./, ./operators/ or ./services/)" >&2
          exit 1
        fi
        module=$(go mod edit -json "$dir/go.mod" | jq -r '.Module.Path')
        echo ">> bumping consumers of $module to $version"
        # Trailing space pins the require line for exactly this module, not a
        # longer path that shares its prefix (e.g. .../apis vs .../apis/foo).
        grep -rls "$module " --include=go.mod . | while read -r f; do
          d=$(dirname "$f")
          # Skip the module's own go.mod.
          [ "$(go mod edit -json "$f" | jq -r '.Module.Path')" = "$module" ] && continue
          echo "   - $d"
          (cd "$d" && go get "$module@$version" && go mod tidy)
        done
        # Re-sync the workspace with GOWORK reset (the task disables it above so
        # the per-module bumps resolve the published version, not the local copy).
        GOWORK= go work sync

  # ---------------------------------------------------------------------------
  # Workspace helpers
  # ---------------------------------------------------------------------------
  tidy:
    desc: Tidy every module's go.mod (standalone) and re-sync the workspace.
    cmds:
      - for: {var: COMPONENTS}
        cmd: task tidy-{{.ITEM}}
      - go work sync
  "tidy-*":
    desc: "Tidy one module's go.mod (e.g. task tidy-apis)."
    env:
      GOWORK: "off"
    cmds:
      - |
        comp='{{index .MATCH 0}}'
        dir=$(ls -d "$comp" "operators/$comp" "services/$comp" 2>/dev/null | head -1)
        if [ -z "$dir" ]; then
          echo "unknown component '$comp' (not under ./, ./operators/ or ./services/)" >&2
          exit 1
        fi
        # Forward version-pin replaces from go.work into the module's go.mod so
        # it resolves standalone, e.g. in docker builds.
        replaces=$(GOWORK= go work edit -json | jq -r '.Replace[] | "\(.Old.Path)=\(.New.Path)@\(.New.Version)"')
        cd "$dir"
        for r in $replaces; do go mod edit -replace="$r"; done
        go mod tidy
        # Drop old replaces and those whose Old path isn't referenced by this module.
        deps=$(go list -m -f '{{`{{.Path}}`}}' all)
        for r in $(go mod edit -json | jq -r '.Replace[]?.Old.Path'); do
          grep -qxF "$r" <<<"$deps" || go mod edit -dropreplace="$r"
        done

version: "3"

includes:
  # Shared go-installable tooling (controller-gen, golangci-lint, mockery,
  # apigen), installed once into the root bin/ and reused by every component.
  tools:
    taskfile: ../../tools/Taskfile.yaml
    dir: .

tasks:
  ## Code Generation
  generate:
    desc: "Generate all CRD-related files (manifests + deepcopy methods)"
    deps: [tools:apigen]
    cmds:
      - task: mockery
      - task: tools:generate-crds
        vars:
          PATH: /gateway/...
          OUTPUT: config/crd
      - "{{.BIN}}/apigen --output-dir config/kcp --input-dir config/crd --header-file {{.HACK}}/boilerplate/boilerplate.yaml.txt"

  ## Development
  build:
    cmds:
      - go build ./...

  docker:
    cmds:
      - docker build -t ghcr.io/platform-mesh/kubernetes-graphql-gateway .

  docker:kind:
    desc: "Build container image with current tag from kind cluster and load it"
    vars:
      CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
      KIND_CLUSTER: '{{.KIND_CLUSTER | default "platform-mesh"}}'
      DEPLOYMENT_NAME: '{{.DEPLOYMENT_NAME | default "kubernetes-graphql-gateway"}}'
      DEPLOYMENT_NAMESPACE: '{{.DEPLOYMENT_NAMESPACE | default "platform-mesh-system"}}'
      IMAGE_TAG:
        sh: kubectl get deployment {{.DEPLOYMENT_NAME}} -n {{.DEPLOYMENT_NAMESPACE}} -o jsonpath='{.spec.template.spec.containers[0].image}' | cut -d':' -f2
      IMAGE_NAME: ghcr.io/platform-mesh/kubernetes-graphql-gateway:{{.IMAGE_TAG}}
    cmds:
      - echo "Building image with tag {{.IMAGE_TAG}} using {{.CONTAINER_RUNTIME}}"
      - "{{.CONTAINER_RUNTIME}} build -t {{.IMAGE_NAME}} ."
      - |
        if [ "{{.CONTAINER_RUNTIME}}" = "podman" ]; then
          {{.CONTAINER_RUNTIME}} save {{.IMAGE_NAME}} -o /tmp/kind-image.tar
          kind load image-archive /tmp/kind-image.tar --name {{.KIND_CLUSTER}}
          rm -f /tmp/kind-image.tar
        else
          kind load docker-image {{.IMAGE_NAME}} --name {{.KIND_CLUSTER}}
        fi
      - kubectl rollout restart deployment/{{.DEPLOYMENT_NAME}} -n {{.DEPLOYMENT_NAMESPACE}}
      - echo "Image loaded and deployment restarted"

  ## Testing
  fmt:
    cmds:
      - '"$(UGET_PRINT_PATH=absolute task tools:golangci-lint)" fmt ./...'
  lint:
    cmds:
      - task: fmt
      - task: tools:lint
  envtest:
    deps: [tools:envtest]
    cmds:
      - |
        set -ex
        export KUBEBUILDER_ASSETS=$({{.BIN}}/setup-envtest use {{.ENVTEST_K8S_VERSION}} --bin-dir {{.BIN}} -p path)
        go test ./... {{.ADDITIONAL_COMMAND_ARGS}}
  test:
    cmds:
      - task: envtest
        vars:
          ADDITIONAL_COMMAND_ARGS: -coverprofile=./cover.out -covermode=atomic -coverpkg=./...
  test-e2e: # alias to appease the global taskfile
    cmds:
      - task: test
  cover:
    deps: [tools:go-test-coverage]
    cmds:
      - task: envtest
        vars:
          ADDITIONAL_COMMAND_ARGS: -coverprofile=./cover.out -covermode=atomic -coverpkg=./...
      - "{{.BIN}}/go-test-coverage --profile cover.out --config ./.testcoverage.yml"
  cover-html:
    desc: "Generate and open HTML coverage report"
    deps: [cover]
    cmds:
      - go tool cover -html=cover.out -o coverage.html
      - open coverage.html || xdg-open coverage.html || start coverage.html
  fuzz:
    desc: "Run fuzz tests with a configurable duration (default 30s per target)"
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - go test ./gateway/schema/types/ -run=^$ -fuzz=FuzzSanitizeFieldName -fuzztime={{.FUZZTIME}} -count=1
      - go test ./gateway/gateway/queryvalidation/ -run=^$ -fuzz=FuzzValidate -fuzztime={{.FUZZTIME}} -count=1
      - go test ./gateway/utils/context/ -run=^$ -fuzz=FuzzFindClusterTarget -fuzztime={{.FUZZTIME}} -count=1
  validate:
    desc: "Run all validation checks including code generation, linting, and testing"
    cmds:
      - task: generate
      - task: lint
      - task: test

  mockery:
    deps: [tools:mockery]
    cmds:
      - "{{.BIN}}/mockery"
  proto:
    desc: "Generate protobuf files"
    cmds:
      - protoc --go_out=. --go-grpc_out=. --go_opt=module=go.platform-mesh.io/kubernetes-graphql-gateway --go-grpc_opt=module=go.platform-mesh.io/kubernetes-graphql-gateway ./apis/proto/schemahandler.proto

  gateway:
    desc: "Start the GraphQL gateway server (kills existing process on port 8080 if needed)"
    cmds:
      - |
        # Check if port 8080 is in use and kill the process if found
        PID=$(lsof -ti:8080 2>/dev/null || echo "")
        if [ ! -z "$PID" ]; then
          echo "Found existing process $PID on port 8080, killing it..."
          kill $PID 2>/dev/null || true
          sleep 2
        fi
      - go run main.go gateway --enable-playground

  listener:
    desc: "Start the listener server (kills existing process on port 8090 if needed)"
    cmds:
      - go run main.go listener

  listener-kcp:
    desc: "Start the listener server (kills existing process on port 8090 if needed)"
    cmds:
      - go run main.go listener --apiexport-endpoint-slice-name gateway.platform-mesh.io --multicluster-runtime-provider kcp --kubeconfig=.secret/cc-d2-kcp.yaml

all: false
force-file-write: true
formatter: goimports
log-level: info
recursive: false
require-template-schema-exists: true
template: testify
template-schema: '{{.Template}}.schema.json'
dir: 'listener/pkg/apischema/mocks'
pkgname: mocks
structname: 'Mock{{.InterfaceName}}'
filename: 'mock_{{.InterfaceName}}.go'
template-data:
  boilerplate-file: ../../hack/boilerplate/boilerplate.go.txt
packages:
  k8s.io/apimachinery/pkg/api/meta:
    config:
      include-interface-regex: '^RESTMapper$'
  k8s.io/client-go/discovery:
    config:
      include-interface-regex: '^DiscoveryInterface$'
  k8s.io/client-go/openapi:
    config:
      include-interface-regex: '^(Client|GroupVersion)$'

version: '3'

includes:
  # Shared go-installable tooling (controller-gen, golangci-lint, mockery,
  # apigen), installed once into the root bin/ and reused by every component.
  tools:
    taskfile: ../../tools/Taskfile.yaml
    dir: .

tasks:
  ## Development
  generate:
    cmds:
      - task: mockery
      - go generate ./...
  generate:keycloak:
    desc: "Generate minimal Keycloak client from OpenAPI spec"
    deps: [tools:oapi-codegen]
    cmds:
      - "{{.BIN}}/oapi-codegen -config oapi-codegen.yaml keycloak-minimal.json"
      - echo "Generated minimal Keycloak client in pkg/keycloak/client/client.go"
  mockery:
    deps: [tools:mockery]
    cmds:
      - "{{.BIN}}/mockery"
  fmt:
    cmds:
      - go fmt ./...
  lint:
    cmds:
      - task: fmt
      - task: tools:lint
  build:
    cmds:
      - go build ./...
  run:
    dotenv: [".env"]
    cmds:
      - go run ./main.go serve
  unittest:
    cmds:
      - go clean -testcache
      - go test -coverprofile=cover.out ./...
  cover:
    deps:
      - task: setup:go-test-coverage
      - task: test
    cmds:
        - "{{.BIN}}/go-test-coverage --profile cover.out --config ./.testcoverage.yml"
  test:
    deps:
      - task: unittest
  test-e2e: # alias to appease the global taskfile
    cmds:
      - task: test
  fuzz:
    desc: "Run fuzz tests with a configurable duration (default 30s per target)"
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - go test ./pkg/directive/ -run=^$ -fuzz=FuzzExtractResourceContext -fuzztime={{.FUZZTIME}} -count=1
      - go test ./pkg/sorter/ -run=^$ -fuzz=FuzzParseUserSortField -fuzztime={{.FUZZTIME}} -count=1
      - go test ./pkg/sorter/ -run=^$ -fuzz=FuzzParseSortDirection -fuzztime={{.FUZZTIME}} -count=1
  validate:
    cmds:
      - task: fmt
      - task: lint
      - task: build
      - task: cover
  docker:kind:
    desc: "Build container image with current tag from kind cluster and load it"
    vars:
      CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
      KIND_CLUSTER: '{{.KIND_CLUSTER | default "platform-mesh"}}'
      DEPLOYMENT_NAME: '{{.DEPLOYMENT_NAME | default "iam-service"}}'
      DEPLOYMENT_NAMESPACE: '{{.DEPLOYMENT_NAMESPACE | default "platform-mesh-system"}}'
      IMAGE_TAG:
        sh: kubectl get deployment {{.DEPLOYMENT_NAME}} -n {{.DEPLOYMENT_NAMESPACE}} -o jsonpath='{.spec.template.spec.containers[0].image}' | cut -d':' -f2
      IMAGE_NAME: ghcr.io/platform-mesh/iam-service:{{.IMAGE_TAG}}
    cmds:
      - echo "Building image with tag {{.IMAGE_TAG}} using {{.CONTAINER_RUNTIME}}"
      - "{{.CONTAINER_RUNTIME}} build -t {{.IMAGE_NAME}} ."
      - |
        if [ "{{.CONTAINER_RUNTIME}}" = "podman" ]; then
          {{.CONTAINER_RUNTIME}} save {{.IMAGE_NAME}} -o /tmp/kind-image.tar
          kind load image-archive /tmp/kind-image.tar --name {{.KIND_CLUSTER}}
          rm -f /tmp/kind-image.tar
        else
          kind load docker-image {{.IMAGE_NAME}} --name {{.KIND_CLUSTER}}
        fi
      - kubectl rollout restart deployment/{{.DEPLOYMENT_NAME}} -n {{.DEPLOYMENT_NAMESPACE}}
      - echo "Image loaded and deployment restarted"

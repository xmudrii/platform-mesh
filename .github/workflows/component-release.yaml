name: Component release (image + chart)

# Builds and publishes a single component's container image and (if present) its
# Helm chart from the monorepo, stamped with that component's OWN version.
#
# Triggered by a per-component release tag `<dir>/v<X.Y.Z>` (cut by cmd/release):
#
#   operators/account-operator/v0.1.0   -> ghcr.io/platform-mesh/platform-mesh/account-operator:{v0.1.0,0.1.0}
#   operators/security-operator/v0.1.0  -> ghcr.io/platform-mesh/platform-mesh/security-operator:{v0.1.0,0.1.0}
#
# The component name and version are parsed from the tag. The image is tagged
# `vX.Y.Z` and `X.Y.Z`. If the component directory contains a Helm chart
# (Chart.yaml), it is packaged with version=X.Y.Z / appVersion=vX.Y.Z and pushed
# as an OCI chart; components without a chart (account/security-operator today,
# which deploy via config/ kustomize) just publish the image.
#
# The `apis/v*` tag is intentionally NOT handled here: it is a go-gettable module
# tag (platform-mesh.io/apis@vX.Y.Z) with no image to build.

on:
  push:
    tags:
      - 'operators/*/v*'
      - 'services/*/v*'

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse component + version from tag
        id: tag
        run: |
          set -euo pipefail
          # refs/tags/operators/account-operator/vX.Y.Z
          FULL="${GITHUB_REF#refs/tags/}"      # operators/account-operator/v0.1.0
          VERSION="${FULL##*/}"                # v0.1.0
          DIR="${FULL%/*}"                     # operators/account-operator
          NAME="${DIR##*/}"                    # account-operator
          [ -d "${DIR}" ] || { echo "unknown component directory ${DIR}"; exit 1; }
          [ -f "${DIR}/Dockerfile" ] || { echo "no Dockerfile in ${DIR}"; exit 1; }

          # Image name/context/tags are derived by `task images-<name>`; here we
          # only surface what the rest of the workflow needs: the component name
          # (passed to the task), its dir (chart lookup) and the version.
          echo "name=${NAME}"          >> "$GITHUB_OUTPUT"
          echo "dir=${DIR}"            >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"    >> "$GITHUB_OUTPUT"   # v0.1.0 (chart appVersion + image tag)
          echo "semver=${VERSION#v}"   >> "$GITHUB_OUTPUT"   # 0.1.0  (chart version, OCI convention)

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Build via the root Taskfile so CI and `task images-<name>` produce the
      # exact same multi-arch image. The task derives context, Dockerfile and the
      # vX.Y.Z + X.Y.Z tags itself from the component name and VERSION.
      - name: Build and push image
        run: |
          task images-${{ steps.tag.outputs.name }} \
            VERSION=${{ steps.tag.outputs.version }} \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ github.repository }} \
            PLATFORMS=linux/amd64,linux/arm64 \
            PUSH=true

      - name: Locate Helm chart
        id: chart
        run: |
          set -euo pipefail
          # A component may ship its chart under chart/, deploy/chart/ or
          # deploy/charts/<name>/. Take the first Chart.yaml found in its tree.
          CHART_YAML="$(find "${{ steps.tag.outputs.dir }}" -name Chart.yaml -not -path '*/charts/*/charts/*' | head -1 || true)"
          if [ -z "${CHART_YAML}" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No chart in ${{ steps.tag.outputs.dir }} — publishing image only."
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "dir=$(dirname "${CHART_YAML}")" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Helm
        if: steps.chart.outputs.found == 'true'
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Package and push chart
        if: steps.chart.outputs.found == 'true'
        env:
          HELM_EXPERIMENTAL_OCI: 1
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | helm registry login "${REGISTRY}" --username ${{ github.actor }} --password-stdin

          chart_dir="${{ steps.chart.outputs.dir }}"
          chart_name=$(grep -E '^name:' "${chart_dir}/Chart.yaml" | head -1 | awk '{print $2}')

          # Chart version follows OCI/semver convention (no 'v'); appVersion keeps
          # the 'v' so a chart whose image.tag defaults to .Chart.AppVersion
          # matches the 'vX.Y.Z' image tag pushed above.
          CHART_VERSION="${{ steps.tag.outputs.semver }}"
          APP_VERSION="${{ steps.tag.outputs.version }}"

          # lint renders templates against default values (package only tars), so
          # a broken template fails here rather than shipping.
          helm lint "$chart_dir"
          # Stamp version + appVersion at package time via flags rather than
          # rewriting Chart.yaml, so the checked-out source is never mutated.
          helm package "$chart_dir" --version "${CHART_VERSION}" --app-version "${APP_VERSION}"
          helm push "${chart_name}-${CHART_VERSION}.tgz" "oci://${REGISTRY}/${{ github.repository }}/charts"
          echo "Pushed oci://${REGISTRY}/${{ github.repository }}/charts/${chart_name}:${CHART_VERSION} (appVersion ${APP_VERSION})"

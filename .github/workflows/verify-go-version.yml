name: verify-go-version

# Verify that every go.mod file declares the minimum required Go version based
# on its dependencies, not an unnecessarily high version.

on:
  push:
    branches:
      - main
    paths:
      - '**/go.mod'
      - 'hack/verify-go-version.sh'
      - '.github/workflows/verify-go-version.yml'
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - '**/go.mod'
      - 'hack/verify-go-version.sh'
      - '.github/workflows/verify-go-version.yml'

permissions:
  contents: read

concurrency:
  group: verify-go-version-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
          cache: true
      - name: Enable git CLI clones using GITHUB_TOKEN
        run: |
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify Go versions in go.mod files
        run: hack/verify-go-version.sh
        env:
          GOPRIVATE: github.com/platform-mesh

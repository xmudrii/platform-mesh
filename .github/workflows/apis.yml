name: apis

# Per-module pipeline for apis — a go-gettable library
# (go.platform-mesh.io/apis), so there is no image, chart, SBOM or OCM
# component; it ships as a Git-tagged Go module.
#   - Pull requests:          lint + test only.
#   - Push to main:           lint + test (validates main stays releasable).
#   - Push a git tag apis/v*: lint + test, then cut a GitHub release for the tag.
#
# Releases are module-scoped: tagging `apis/v1.2.3` is the Go-module
# version tag (subdirectory tags are how Go versions a module inside a monorepo)
# and never touches the other components. Cut tags with `task release --
# apis` (see cmd/release).
#
# Quality jobs run from the repository ROOT via the root Taskfile's
# per-component targets so the go.work workspace is in scope.

on:
  push:
    branches:
      - main
    tags:
      - 'apis/v*'
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - 'apis/**'
      - 'go.work'
      - 'go.work.sum'
      - '.github/workflows/apis.yml'

permissions:
  contents: read

concurrency:
  group: apis-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPONENT: apis

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.work
          cache: true # zizmor: ignore[cache-poisoning]
      - name: Enable git CLI clones using GITHUB_TOKEN
        run: |
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task lint-${COMPONENT}

  test:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/platform-mesh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.work
          cache: true # zizmor: ignore[cache-poisoning]
      - name: Enable git CLI clones using GITHUB_TOKEN
        run: |
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task test-${COMPONENT}

  # ──────────────────────────────────────────────
  # Tag apis/v*: cut the GitHub release for the module tag.
  # ──────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/apis/')
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create the GitHub release for the tag
    steps:
      - name: Create Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          allowUpdates: true
          draft: false
          makeLatest: true
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

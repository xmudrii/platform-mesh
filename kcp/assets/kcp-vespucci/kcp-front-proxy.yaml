apiVersion: operator.kcp.io/v1alpha1
kind: FrontProxy
metadata:
  name: frontproxy
  namespace: kcp-vespucci
spec:
  externalHostname: api.vespucci.genericcontrolplane.io
  rootShard:
    ref:
      name: root
  certificateTemplates:
    server:
      metadata:
        annotations:
          cert-manager.io/cluster-issuer: "faros-letsencrypt-prod"
      spec:
        issuerRef:
          name: faros-letsencrypt-prod
          kind: ClusterIssuer
          group: cert-manager.io
        dnsNames:
        - api.vespucci.genericcontrolplane.io
  auth:
    serviceAccount:
      enabled: true
    oidc:
      issuerURL: https://auth.genericcontrolplane.io
      clientID: platform-mesh
      groupsClaim: groups
      usernameClaim: email
      usernamePrefix: "oidc:"
      groupsPrefix: "oidc:"
      clientSecret: Z2Fyc2lha2FsYmlzdmFuZGVuekWplCg==
  serviceTemplate:
    metadata:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: nlb
        service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
        service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
        service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    spec:
      type: LoadBalancer